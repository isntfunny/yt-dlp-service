services:
  ytdlp:
    build: .
    restart: always
    environment:
      # REQUIRED. Without it every protected endpoint returns 503 (fail-closed).
      YTDLP_SERVICE_TOKEN: ${YTDLP_SERVICE_TOKEN}
    ports:
      - "${YTDLP_SERVICE_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
